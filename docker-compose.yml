services:
  norprog:
    image: jannordskog/norprog:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: norprog
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
