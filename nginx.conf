server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip compression
    gzip               on;
    gzip_vary          on;
    gzip_min_length    256;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/ld+json
        image/svg+xml
        font/woff
        font/woff2;

    # Security headers
    add_header X-Content-Type-Options       "nosniff"                                      always;
    add_header X-Frame-Options              "SAMEORIGIN"                                   always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy           "geolocation=(), microphone=(), camera=()"     always;
    add_header X-XSS-Protection             "1; mode=block"                                always;

    # NOTE: `expires` directive composes Cache-Control header at server level,
    # so we use it instead of `add_header Cache-Control` (which would shadow
    # the server-level security headers due to nginx inheritance rules).

    # Cache static assets aggressively (1 year)
    location ~* \.(?:jpg|jpeg|gif|png|webp|avif|svg|ico|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    # CSS/JS (less aggressive; in case of updates)
    location ~* \.(?:css|js|map)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # robots.txt — short cache
    location = /robots.txt {
        expires 1h;
        try_files $uri =404;
    }
    # sitemap.xml — short cache, force XML mime
    location = /sitemap.xml {
        expires 1h;
        types { } default_type application/xml;
        try_files $uri =404;
    }

    # HTML — no aggressive cache so content updates ship immediately
    location ~* \.html$ {
        expires -1;
        try_files $uri =404;
    }

    # Default: try static file, then without extension (.html), fall back to index.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Block access to hidden / sensitive files
    location ~ /\.(?!well-known) { deny all; }
    location ~* \.(tmp|bak|backup|swp|old|env)$ { deny all; }

    # Custom 404
    error_page 404 /index.html;
}
